name: Release to PyPI

# Fallback trigger for manually pushed tags.
# The primary release path is the "release" job in auto-tag.yml,
# which runs after auto-tagging on PR merge.
# Tags created by GITHUB_TOKEN (auto-tag) do NOT trigger push events,
# so this workflow only fires for tags pushed by humans or PATs.

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: pypi
      url: https://pypi.org/project/sphinx-adr/
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Sync VERSION into __init__.py
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "::error::VERSION file ($VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          sed -i "s/^__version__ = .*/__version__ = \"$VERSION\"/" sphinx_adr/__init__.py
          echo "Package version set to: $VERSION"
          grep __version__ sphinx_adr/__init__.py

      - name: Build package
        run: uv build

      - name: Verify built package version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          ls dist/
          ls dist/ | grep "$VERSION" || { echo "::error::Built package does not match version $VERSION"; exit 1; }

      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
